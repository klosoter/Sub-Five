<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join · {{ room_code }} · Sub-Five</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='menu.css') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icon-192.png') }}">
</head>
<body class="menu">
  <div class="center-page">
    <div class="panel join-card">
      <div class="code-label">Room code</div>
      <div class="big-code">{{ room_code }}</div>
      <div class="copy-row">
        <button class="btn btn--ghost" type="button" onclick="copyLink()" id="copyBtn">🔗 Copy invite link</button>
      </div>

      <p style="color:var(--text-secondary);margin:0 0 0.25rem">
        You're in as <strong style="color:var(--text-primary)">{{ player_name }}</strong>
      </p>

      <ul class="player-list" id="player-list"></ul>

      <div class="join-actions">
        <button id="readyBtn" class="btn btn--primary" type="button" onclick="toggleReady()">I'm Ready</button>
        <button id="leaveBtn" class="btn btn--danger" type="button">Leave</button>
      </div>
      <p class="helper" id="helper">Waiting for at least 2 players to be ready…</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const roomCode = "{{ room_code }}";
    const playerName = {{ player_name|tojson }};
    let readyState = false;

    function toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 1800);
    }

    function copyLink() {
      const link = `${location.origin}/join/${roomCode}`;
      navigator.clipboard.writeText(link).then(() => toast("Invite link copied"));
    }

    document.getElementById("leaveBtn").addEventListener("click", () => {
      // Native form POST: the browser waits for the server and follows its redirect,
      // so leaving is reliable even on a slow connection.
      const f = document.createElement("form");
      f.method = "POST"; f.action = "/leave";
      document.body.appendChild(f); f.submit();
    });

    async function toggleReady() {
      const res = await fetch(`/toggle-ready/${roomCode}`, { method: "POST" });
      if (res.status === 401) { window.location.href = "/login"; return; }
      if (!res.ok) return;
      const data = await res.json();
      if (data.status === "started") { window.location.href = "/game"; return; }
      readyState = data.ready;
      updateReadyButton();
    }

    function updateReadyButton() {
      const btn = document.getElementById("readyBtn");
      btn.textContent = readyState ? "Cancel Ready" : "I'm Ready";
      btn.classList.toggle("btn--ghost", readyState);
      btn.classList.toggle("btn--primary", !readyState);
    }

    async function pollRoom() {
      let data;
      try {
        const res = await fetch(`/room-state/${roomCode}`);
        if (res.status === 401) { window.location.href = "/login"; return; }
        if (!res.ok) return;
        data = await res.json();
      } catch { return; }
      if (data.error) { window.location.href = "/"; return; }
      if (data.started) { window.location.href = "/game"; return; }

      const names = data.players || [];
      const ready = data.ready || {};
      const host = data.host;
      readyState = !!ready[playerName];
      updateReadyButton();

      const list = document.getElementById("player-list");
      list.innerHTML = names.map(name => {
        const on = ready[name];
        const initial = (name[0] || "?").toUpperCase();
        const crown = name === host ? ' <span title="Host">👑</span>' : '';
        return `<li>
          <span class="avatar" style="background:${on ? 'var(--accent)' : 'var(--bg-elevated-2)'};color:${on ? 'var(--text-on-accent)' : 'var(--text-secondary)'}">${initial}</span>
          <span class="nm">${name}${crown}${name === playerName ? ' <span style="color:var(--text-muted)">(you)</span>' : ''}</span>
          <span class="ready-pill ${on ? 'on' : 'off'}">${on ? '✓ Ready' : 'Not ready'}</span>
        </li>`;
      }).join("");

      const readyCount = names.filter(n => ready[n]).length;
      const helper = document.getElementById("helper");
      helper.textContent = names.length < 2
        ? "Waiting for more players to join…"
        : `${readyCount}/${names.length} ready — game starts when everyone's ready.`;
    }

    pollRoom();
    setInterval(pollRoom, 1000);
  </script>
</body>
</html>
